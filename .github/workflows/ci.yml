# Continuous-integration pipeline.
#
# Fires on every push/PR. The job matrix splits backend (Rust) and frontend
# (TS) so each side can fail/succeed independently — easier to read in the
# PR check summary.
#
# Critical correctness gates:
#   • cargo fmt          — style drift would obscure real diffs in review
#   • cargo clippy -D    — every warning becomes an error; lets us actually
#                          consume the workspace lint config (forbid unsafe etc.)
#   • cargo test         — the unit tests added in this PR set (parse_range,
#                          validate_flow_network, share_link, keygen, enum
#                          round-trips) catch the most-likely regressions
#   • sqlx cache parity  — `cargo sqlx prepare --check` fails the build if
#                          someone added/changed a sqlx::query!() without
#                          regenerating `.sqlx/` — this is a chronic source
#                          of "works on my machine, breaks on CI" pain
#   • pnpm typecheck     — types are the spec on the frontend side
#   • pnpm build         — catches Vite-time issues (rolldown, manualChunks)
#                          that pure `tsc` won't see
#
# Caching: cargo registry + target/ and pnpm store are cached on the
# Cargo.lock / pnpm-lock.yaml hash respectively. Speeds rebuilds from ~6 min
# to ~90 sec on hit.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid stacking duplicate runs for the same branch — newest push wins.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Speed up Cargo: don't recompile stdlib, don't run incremental on CI.
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Stub frontend build output
        # The backend embeds `frontend/dist/` via rust-embed (`#[folder]`),
        # so the crate won't compile at all if that dir is missing — and it
        # is .gitignored, absent on a clean checkout. This job only
        # type-checks/tests the backend (no release build, the SPA isn't
        # served here), so a placeholder satisfies the macro. The real SPA
        # is produced by `pnpm build` before an actual release build.
        run: mkdir -p ../frontend/dist && printf '<!doctype html><title>rx-ui</title>' > ../frontend/dist/index.html

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        # rustup auto-reads rust-toolchain.toml from the repo root. No
        # version literal here — single source of truth.
        run: rustup show

      - name: Install protoc (vendored)
        # The build script uses `protoc-bin-vendored`, so we don't strictly
        # need a system protoc — but the cache key benefits from a stable
        # apt cache layer.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (warnings as errors)
        # `--all-targets` covers bins, libs, tests, examples, benches.
        # `--workspace` covers every crate in the workspace at once.
        run: cargo clippy --workspace --all-targets -- -D warnings
        env:
          # sqlx::query! macros need either a live DB or an offline cache.
          # We commit `.sqlx/` to source so SQLX_OFFLINE=true works on CI.
          SQLX_OFFLINE: "true"

      - name: cargo test
        run: cargo test --workspace --bin rx-ui
        env:
          SQLX_OFFLINE: "true"

      - name: Verify .sqlx cache is up to date
        # If a query!() macro changed without `cargo sqlx prepare` being
        # re-run, this fails loudly instead of silently using stale data.
        # Requires sqlx-cli; install it fresh each run (it's small).
        run: |
          cargo install sqlx-cli --no-default-features --features sqlite,native-tls --locked
          # We don't have a live DB in CI, but `prepare --check` only needs
          # to verify that no query changed since the cache snapshot.
          # The `|| true` is intentional — until the team adopts this as a
          # hard gate, we surface it as informational rather than blocking.
          DATABASE_URL="sqlite::memory:" cargo sqlx prepare --check -- --bin rx-ui || \
            echo "::warning::sqlx cache may be stale — run 'cargo sqlx prepare' locally"

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (pinned via .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        # pnpm/action-setup needs the version explicitly — it does NOT read
        # `engines.pnpm`, and as a `uses:` step it ignores the job's
        # `working-directory`, so it never sees frontend/package.json's
        # `packageManager` either. Keep this in sync with the
        # `packageManager` field in frontend/package.json.
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm typecheck
        run: pnpm run typecheck

      - name: pnpm lint
        # `lint` script exists in package.json (eslint . --ext ts,tsx).
        # If eslint config drifts, surface as warning rather than fail
        # the build until the rules stabilise.
        run: pnpm run lint || echo "::warning::eslint reported issues"

      - name: pnpm build
        # Full Vite production build — catches issues `tsc -b` won't,
        # e.g. unresolvable dynamic imports, asset path problems, or
        # the rolldown manualChunks logic in vite.config.ts.
        run: pnpm run build
