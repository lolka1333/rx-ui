# Run rx-ui from the prebuilt image published to GHCR by CI — no local compile,
# so `up` is a quick pull-and-start instead of a ~6-minute Rust build.
#
#   docker compose pull              # fetch the latest image
#   docker compose up -d             # start (or restart onto the new image)
#   docker compose logs -f           # follow logs
#   docker compose down              # stop (the data volume is kept)
#
# The image is pushed to ghcr.io/lolka1333/rx-ui:latest on every push to main.
# If the package is private, log in once on the host first:
#   echo <GITHUB_PAT_with_read:packages> | docker login ghcr.io -u <user> --password-stdin
# (or flip the package to public in its GitHub settings — then no login needed).
#
# To build from source instead of pulling, uncomment the `build:` block below
# and run `docker compose up -d --build`.
#
# First run: the panel comes up on :8080 with admin / admin (change it in the
# UI immediately) and auto-downloads xray-core into the data volume.

services:
  rx-ui:
    image: ghcr.io/lolka1333/rx-ui:latest
    # Build from source instead of pulling (slow — compiles the Rust release).
    # Uncomment and run `docker compose up -d --build`.
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: rx-ui
    restart: unless-stopped

    # Host networking is the right mode for an xray panel: VPN inbounds you
    # create listen on operator-chosen ports (443, 8443, ...), and host mode
    # makes every one reachable without re-declaring port maps here.
    # Linux only.
    #
    # On Docker Desktop (macOS / Windows), where host networking is limited,
    # comment out the line below and use the bridge `ports:` block instead —
    # note that only the panel UI will be reachable that way; VPN inbounds
    # would each need their own mapping.
    network_mode: host
    # ports:
    #   - "8080:8080"   # panel UI only (bridge-mode fallback)

    # Optional overrides (PANEL_PORT, RUST_LOG, JWT_SECRET,
    # ADMIN_INITIAL_PASSWORD). Copy .env.example to .env to use it; the file
    # is optional and image defaults apply when it is absent.
    env_file:
      - path: .env
        required: false

    volumes:
      # Panel DB, JWT secret, and the downloaded xray binary/config/geofiles.
      - rx-ui-data:/app/data

volumes:
  rx-ui-data:
